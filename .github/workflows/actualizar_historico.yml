name: Actualizar Histórico API

on:
  schedule:
    - cron: '0 23 * * 0'   # Cada domingo a las 11pm UTC
  workflow_dispatch:        # Ejecución manual desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas requests

      - name: Actualizar histórico
        env:
          TOKEN_REPO:  ${{ secrets.TOKEN_REPO }}
          API_USUARIO: ${{ secrets.API_USUARIO }}
        run: python data/actualizar_historico.py
