name: Migrar Pieza 2 (prog + costos)

on:
  workflow_dispatch:
    inputs:
      tabla:
        description: 'Qué migrar'
        required: true
        default: 'ambas'
        type: choice
        options:
          - ambas
          - solo_prog
          - solo_costos

jobs:
  migrar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          # Driver ODBC 18 para SQL Server
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18
          # Python deps
          pip install pyodbc requests

      - name: Migrar programacion
        if: ${{ github.event.inputs.tabla == 'ambas' || github.event.inputs.tabla == 'solo_prog' }}
        env:
          TOKEN_REPO:    ${{ secrets.TOKEN_REPO }}
          SQL_SERVER:    ${{ secrets.SQL_SERVER }}
          SQL_DATABASE:  ${{ secrets.SQL_DATABASE }}
          SQL_USER:      ${{ secrets.SQL_USER }}
          SQL_PASSWORD:  ${{ secrets.SQL_PASSWORD }}
        run: python data/migrar_prog_historico.py

      - name: Migrar costos
        if: ${{ github.event.inputs.tabla == 'ambas' || github.event.inputs.tabla == 'solo_costos' }}
        env:
          TOKEN_REPO:    ${{ secrets.TOKEN_REPO }}
          SQL_SERVER:    ${{ secrets.SQL_SERVER }}
          SQL_DATABASE:  ${{ secrets.SQL_DATABASE }}
          SQL_USER:      ${{ secrets.SQL_USER }}
          SQL_PASSWORD:  ${{ secrets.SQL_PASSWORD }}
        run: python data/migrar_costos_historico.py
