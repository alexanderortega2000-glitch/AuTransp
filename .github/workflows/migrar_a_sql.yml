name: Migrar datos a Azure SQL

on:
  workflow_dispatch:  # Solo ejecución manual — script de migración única

jobs:
  migrar:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pyodbc

      - name: Instalar ODBC Driver 18
        run: |
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 || \
          (sudo apt-get update && sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18)

      - name: Ejecutar migración
        env:
          TOKEN_REPO:    ${{ secrets.TOKEN_REPO }}
          SQL_SERVER:    ${{ secrets.SQL_SERVER }}
          SQL_DATABASE:  ${{ secrets.SQL_DATABASE }}
          SQL_USER:      ${{ secrets.SQL_USER }}
          SQL_PASSWORD:  ${{ secrets.SQL_PASSWORD }}
        run: python data/migrar_a_sql.py
