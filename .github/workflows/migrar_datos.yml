name: Migrar datos a Azure SQL

on:
  workflow_dispatch:
    inputs:
      tabla:
        description: 'Qué migrar'
        required: true
        default: 'todo'
        type: choice
        options:
          - todo
          - solo_prog_historico
          - solo_prog_actual
          - solo_costos_historico
          - solo_costos_actual

jobs:
  migrar:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar ODBC Driver 18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Instalar dependencias Python
        run: pip install pyodbc openpyxl

      - name: Migrar prog histórico
        if: ${{ github.event.inputs.tabla == 'todo' || github.event.inputs.tabla == 'solo_prog_historico' }}
        env:
          SQL_SERVER:    ${{ secrets.SQL_SERVER }}
          SQL_DATABASE:  ${{ secrets.SQL_DATABASE }}
          SQL_USER:      ${{ secrets.SQL_USER }}
          SQL_PASSWORD:  ${{ secrets.SQL_PASSWORD }}
        run: python data/migrar_prog.py --archivo "data/prog_historico_consolidado.csv.gz" --etiqueta historico

      - name: Migrar prog actual
        if: ${{ github.event.inputs.tabla == 'todo' || github.event.inputs.tabla == 'solo_prog_actual' }}
        env:
          SQL_SERVER:    ${{ secrets.SQL_SERVER }}
          SQL_DATABASE:  ${{ secrets.SQL_DATABASE }}
          SQL_USER:      ${{ secrets.SQL_USER }}
          SQL_PASSWORD:  ${{ secrets.SQL_PASSWORD }}
        continue-on-error: true   # si no existe el archivo, no falla todo el workflow
        run: |
          if [ -f "data/prog_actual.xlsx" ]; then
            python data/migrar_prog.py --archivo "data/prog_actual.xlsx" --etiqueta actual --no-truncate
          else
            echo "  data/prog_actual.xlsx no existe, salteando"
          fi

      - name: Migrar costos histórico
        if: ${{ github.event.inputs.tabla == 'todo' || github.event.inputs.tabla == 'solo_costos_historico' }}
        env:
          SQL_SERVER:    ${{ secrets.SQL_SERVER }}
          SQL_DATABASE:  ${{ secrets.SQL_DATABASE }}
          SQL_USER:      ${{ secrets.SQL_USER }}
          SQL_PASSWORD:  ${{ secrets.SQL_PASSWORD }}
        run: |
          curl -L -o /tmp/CostosAgricampoHist.csv.gz \
            "https://github.com/alexanderortega2000-glitch/AuTransp/releases/download/costos-hist-v1/CostosAgricampoHist_consolidado.csv.gz"
          python data/migrar_costos.py --archivo "/tmp/CostosAgricampoHist.csv.gz" --es-historico --respetar-area --no-truncate

      - name: Migrar costos actual
        if: ${{ github.event.inputs.tabla == 'todo' || github.event.inputs.tabla == 'solo_costos_actual' }}
        env:
          SQL_SERVER:    ${{ secrets.SQL_SERVER }}
          SQL_DATABASE:  ${{ secrets.SQL_DATABASE }}
          SQL_USER:      ${{ secrets.SQL_USER }}
          SQL_PASSWORD:  ${{ secrets.SQL_PASSWORD }}
        continue-on-error: true
        run: |
          if [ -f "data/CostosAgricampoActual.csv.gz" ]; then
            python data/migrar_costos.py --archivo "data/CostosAgricampoActual.csv.gz" --no-truncate
          elif [ -f "data/CostosAgricampoActual.xlsx" ]; then
            python data/migrar_costos.py --archivo "data/CostosAgricampoActual.xlsx" --no-truncate
          else
            echo "  data/CostosAgricampoActual.* no existe, salteando"
          fi
