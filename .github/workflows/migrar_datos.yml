name: Migrar datos a Azure SQL

on:
  workflow_dispatch:
    inputs:
      tabla:
        description: 'Qué migrar'
        required: true
        default: 'solo_prog_historico'
        type: choice
        options:
          - solo_prog_historico
          - solo_costos_historico
          - solo_costos_actual

jobs:
  migrar:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar ODBC Driver 18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Instalar dependencias
        run: pip install pyodbc pandas openpyxl

      - name: Migrar prog histórico
        if: ${{ github.event.inputs.tabla == 'solo_prog_historico' }}
        env:
          SQL_SERVER:   ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER:     ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
        run: python data/migrar_prog.py --archivo "data/prog_historico_consolidado.csv.gz" --etiqueta historico

      - name: Migrar costos histórico
        if: ${{ github.event.inputs.tabla == 'solo_costos_historico' }}
        env:
          SQL_SERVER:   ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER:     ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
        run: python data/migrar_costos.py --archivo "data/CostosAgricampoHist.csv.gz"

      - name: Migrar costos actual
        if: ${{ github.event.inputs.tabla == 'solo_costos_actual' }}
        env:
          SQL_SERVER:   ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER:     ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
        run: python data/migrar_costos.py --archivo "data/costos_actual.csv.gz"
