name: Procesar Solicitudes

on:
  repository_dispatch:
    types: [actualizar_solicitudes]

jobs:
  procesar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas requests

      - name: Procesar solicitudes
        env:
          TOKEN_REPO: ${{ secrets.TOKEN_REPO }}
        run: python data/procesar_solicitudes.py
