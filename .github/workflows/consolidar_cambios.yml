name: Consolidar Cambios

on:
  schedule:
    - cron: '*/5 * * * *'   # Cada 5 minutos
  repository_dispatch:
    types: [consolidar_cambios]
  workflow_dispatch:          # Ejecución manual desde GitHub

jobs:
  consolidar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Consolidar cambios
        env:
          TOKEN_REPO: ${{ secrets.TOKEN_REPO }}
        run: python data/consolidar_cambios.py
